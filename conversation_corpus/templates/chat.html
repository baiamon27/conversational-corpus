<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotionally Intelligent Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 1.5em;
            margin-bottom: 5px;
        }
        
        .chat-header p {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message.bot {
            justify-content: flex-start;
        }
        
        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        
        .user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .bot .message-content {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            border-bottom-left-radius: 5px;
        }
        
        .message-meta {
            font-size: 0.7em;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 1em;
        }
        
        .chat-input:focus {
            border-color: #667eea;
        }
        
        .send-button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s;
        }
        
        .send-button:hover {
            transform: scale(1.05);
        }
        
        .mood-indicator {
            display: inline-block;
            margin-left: 5px;
            font-size: 0.9em;
        }
        
        .typing-indicator {
            display: none;
            padding: 10px 20px;
            color: #999;
            font-style: italic;
        }
        
        .clear-button {
            background: #ff4757;
            margin-left: 10px;
        }
        
        .clear-button:hover {
            background: #ff3838;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 Emotionally Intelligent Chatbot</h1>
            <p>I understand your feelings! Tell me how you feel 😊💙</p>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-content">
                    Hello! I'm your emotionally intelligent chatbot. 😊<br>
                    How are you feeling today?
                    <div class="message-meta">Just now</div>
                </div>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            🤖 Bot is typing...
        </div>
        
        <div class="chat-input-container">
            <input type="text" class="chat-input" id="messageInput" 
                   placeholder="Type your message here..." 
                   onkeypress="if(event.key==='Enter') sendMessage()">
            <button class="send-button" onclick="sendMessage()">Send 📤</button>
            <button class="send-button clear-button" onclick="clearChat()">Clear 🗑️</button>
        </div>
    </div>
    
    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const typingIndicator = document.getElementById('typingIndicator');
        
        function addMessage(text, sender, mood = null, intent = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const moodEmojis = {
                'positive': '😊',
                'negative': '💙',
                'neutral': '😐'
            };
            
            const moodEmoji = mood ? moodEmojis[mood] || '' : '';
            const intentText = intent ? ` | Intent: ${intent}` : '';
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${text}
                    ${moodEmoji ? `<span class="mood-indicator">${moodEmoji}</span>` : ''}
                    <div class="message-meta">
                        ${new Date().toLocaleTimeString()}
                        ${intentText}
                    </div>
                </div>
            `;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Add user message
            addMessage(message, 'user');
            messageInput.value = '';
            
            // Show typing indicator
            typingIndicator.style.display = 'block';
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                
                // Hide typing indicator
                typingIndicator.style.display = 'none';
                
                // Add bot response with mood
                addMessage(data.response, 'bot', data.mood, data.intent);
                
            } catch (error) {
                console.error('Error:', error);
                typingIndicator.style.display = 'none';
                addMessage("Sorry, I'm having trouble connecting. Please try again.", 'bot');
            }
        }
        
        async function clearChat() {
            try {
                await fetch('/api/clear', { method: 'POST' });
                chatMessages.innerHTML = '';
                addMessage("Chat cleared! How can I help you?", 'bot');
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        // Auto-focus input
        messageInput.focus();
    </script>
</body>
</html>
